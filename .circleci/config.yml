version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/python:3.14
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r mcp/requirements.txt -r mcp/requirements-test.txt -r ingestor/requirements-test.txt
      - run:
          name: Run MCP tests
          command: cd mcp && pytest
      - run:
          name: Run ingestor tests
          command: cd ingestor && pytest
  test-explore:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - run:
          name: Install explore dependencies
          command: cd explore && npm ci
      - run:
          name: Run explore tests
          command: cd explore && npm test
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - test-explore
      - lucos/build:
          serial-group: << pipeline.project.slug >>/build
      - lucos/deploy-avalon:
          serial-group: deploy-avalon
          requires:
            - test
            - test-explore
            - lucos/build
          filters:
            branches:
              only:
                - main
