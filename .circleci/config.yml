version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/python:3.14
      - image: stain/jena-fuseki
        environment:
          ADMIN_PASSWORD: admin
          JVM_ARGS: -Xmx512m
    steps:
      - checkout
      # Each component is installed into its own virtualenv so the two
      # requirements files never co-resolve. This makes a shared-dependency
      # version skew between mcp/ and ingestor/ (e.g. pytest) structurally
      # unable to deadlock CI, and mirrors production where the components run
      # as separate containers. See lucas42/lucos_arachne#652.
      - run:
          name: Install MCP dependencies
          command: |
            python -m venv /tmp/mcp-venv
            /tmp/mcp-venv/bin/pip install -r mcp/requirements.txt -r mcp/requirements-test.txt
      - run:
          name: Run MCP tests
          command: cd mcp && /tmp/mcp-venv/bin/pytest
      - run:
          name: Install ingestor dependencies
          command: |
            python -m venv /tmp/ingestor-venv
            /tmp/ingestor-venv/bin/pip install -r ingestor/requirements-test.txt
      - run:
          name: Run ingestor tests
          command: cd ingestor && /tmp/ingestor-venv/bin/pytest
  shellcheck:
    docker:
      - image: koalaman/shellcheck-alpine:stable
    steps:
      - checkout
      - run:
          name: Run shellcheck
          command: shellcheck --severity=warning $(find . -name "*.sh" -not -path "*/node_modules/*")
  test-explore:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - run:
          name: Install explore dependencies
          command: cd explore && npm ci
      - run:
          name: Run explore tests
          command: cd explore && npm test
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - test-explore
      - shellcheck
      - lucos/build:
          serial-group: << pipeline.project.slug >>/build/<< pipeline.git.branch >>
      - lucos/deploy-avalon:
          serial-group: deploy-avalon
          requires:
            - test
            - test-explore
            - shellcheck
            - lucos/build
          filters:
            branches:
              only:
                - main
