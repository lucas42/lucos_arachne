services:
  web:
    build: ./web
    container_name: lucos_arachne_web
    ports:
      - $PORT:80
    image: lucas42/lucos_arachne_web:${VERSION:-latest}
    restart: always
    depends_on:
      triplestore:
        condition: service_healthy
      search:
        condition: service_healthy
      ingestor:
        condition: service_healthy
      explore:
        condition: service_healthy
      mcp:
        condition: service_healthy
    environment:
      - PORT
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  triplestore:
    build:
      context: ./triplestore
    container_name: lucos_arachne_triplestore
    image: lucas42/lucos_arachne_triplestore:${VERSION:-latest}
    environment:
      - PORT=3030
      - CLIENT_KEYS
      - JVM_ARGS=-Xmx1024m
    volumes:
      - fuseki_data:/fuseki/run/databases
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--fail", "-s", "-o", "/dev/null", "http://127.0.0.1:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
  ingestor:
    build: ./ingestor
    container_name: lucos_arachne_ingestor
    image: lucas42/lucos_arachne_ingestor:${VERSION:-latest}
    environment:
      - PORT=8099
      - LOGANNE_ENDPOINT
      - SCHEDULE_TRACKER_ENDPOINT
      - KEY_LUCOS_ARACHNE
      - KEY_LUCOS_EOLAS
      - KEY_LUCOS_CONTACTS
      - KEY_LUCOS_MEDIA_METADATA_API
      - SYSTEM=lucos_arachne_ingestor
      - APP_ORIGIN
      - CLIENT_KEYS
    depends_on:
      triplestore:
        condition: service_healthy
      search:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1', 8099)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  explore:
    build: explore
    container_name: lucos_arachne_explore
    image: lucas42/lucos_arachne_explore:${VERSION:-latest}
    restart: always
    depends_on:
      triplestore:
        condition: service_healthy
      search:
        condition: service_healthy
    environment:
      - PORT=8080
      - KEY_LUCOS_ARACHNE
    healthcheck:
      test: ["CMD", "node", "-e", "const n=require('net');const c=n.connect(8080,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  search:
    build: search
    container_name: lucos_arachne_search
    image: lucas42/lucos_arachne_search:${VERSION:-latest}
    environment:
      - TYPESENSE_ADMIN_KEY
      - CLIENT_KEYS
      - PORT=8108
    volumes:
      - typesense_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://127.0.0.1:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  mcp:
    build: ./mcp
    container_name: lucos_arachne_mcp
    image: lucas42/lucos_arachne_mcp:${VERSION:-latest}
    restart: always
    environment:
      - PORT=8200
      - KEY_LUCOS_ARACHNE
      - TYPESENSE_ADMIN_KEY
      - APP_ORIGIN
      - CLIENT_KEYS
    depends_on:
      triplestore:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/_info')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s


volumes:
  fuseki_data:
  typesense_data:
