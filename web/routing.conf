server {
	listen 80 default_server;
	server_tokens off;

	# Use Docker's embedded DNS resolver.
	# Upstream hostnames are set as variables (see below) so resolution is
	# deferred to request time rather than startup — this prevents nginx
	# from failing fatally if an upstream container isn't ready when nginx starts.
	resolver 127.0.0.11 valid=30s;

	# Pass a bunch of headers to the downstream server, so it knows what's going on.
	proxy_set_header Host $http_host;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

	# Backends are sent the correct host header above,
	# so they can handle redirects themselves if needed
	proxy_redirect     off;

	location / {
		rewrite ^/_info$ /_info.json;
		root /etc/nginx/conf.d/;
	}
	location /explore/ {
		set $explore_upstream http://explore:8080;
		rewrite ^/explore/(.*)$ /$1 break;
		proxy_pass $explore_upstream;
	}
	location /search {
		set $search_upstream http://search:8108;
		rewrite ^/search(.*)$ /collections/items/documents/search$1 break;
		proxy_pass $search_upstream;
	}
	location /webhook {
		set $ingestor_upstream http://ingestor:8099;
		rewrite ^/webhook(.*)$ /webhook$1 break;
		proxy_pass $ingestor_upstream;
	}
	location /sparql {
		set $triplestore_upstream http://triplestore:3030;
		rewrite ^/sparql(.*)$ /arachne/$1 break;
		proxy_pass $triplestore_upstream;
	}
	location /mcp {
		set $mcp_upstream http://mcp:8200;
		proxy_pass $mcp_upstream;
	}
	location = / {
		absolute_redirect off;
		return 302 /explore/;
	}
	location = /explore {
		absolute_redirect off;
		return 302 /explore/;
	}
}
